  <main>
    <div class="card">
      <h2>My Activities</h2>
      <p>Add your activity and upload a photo.</p>

      <label>Activity Title:</label>
      <input type="text" id="activityTitle" placeholder="Example: Basketball Training">

      <label>Description:</label>
      <textarea type="text" id="description" row="20" placeholder="Description of the activity"></textarea>
      
      <label>Upload Photo:</label>
      <input type="file" id="activityImage" accept="image/*">

      <button onclick="saveActivity()">Save Activity</button>

      <hr>

      <h3>Saved Activities</h3>
      <div id="activityList"></div>
    </div>
  </main>
